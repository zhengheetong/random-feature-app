<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>QR Generator</h2>
        <p>Enter text or a URL to generate a code.</p>
        
        <input type="text" id="qrText" placeholder="e.g., https://example.com" />
        
        <div class="options">
            <input type="checkbox" id="borderToggle" />
            <label for="borderToggle">✨ Add a cool gradient border</label>
        </div>

        <button onclick="generateQR()">Generate</button>
        
        <div id="qrcode">

        </div>

        <button id="downloadBtn" onclick="downloadQR()" style="display: none;">Download QR Code</button>

        <a href="../index.html" class="back-link">← Back to Features</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
